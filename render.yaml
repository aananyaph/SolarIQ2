services:
  - type: web
    name: solariq-frontend
    env: node
    dir: ./frontend
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: BACKEND_URL
        value: https://solariq-backend.vercel.app
      - key: NODE_ENV
        value: production

  - type: web
    name: SolarIQ Backend
    env: python
    dir: ./backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 5000
